<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>LinenTrack</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f5f0e8;
        color: #001a57;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .boot-fallback {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }

      .boot-fallback strong {
        display: block;
        font-size: 28px;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-fallback">
        <div>
          <strong>LINENTRACK</strong>
          <span>Loading app...</span>
        </div>
      </div>
    </div>
    <script>
      ;(function () {
        var helpText =
          'The app did not finish loading on this device. Update iOS/Safari, disable content blockers for this site, then refresh.'

        function showBootFailure(detail) {
          var root = document.getElementById('root')
          if (!root || !root.querySelector('.boot-fallback')) return
          root.innerHTML =
            '<div class="boot-fallback"><div><strong>LINENTRACK</strong><span style="display:block;margin-top:12px;max-width:460px;line-height:1.5">' +
            helpText +
            (detail ? '<br><br><small style="opacity:.75">' + detail + '</small>' : '') +
            '</span></div></div>'
        }

        window.addEventListener('error', function (event) {
          if (event && event.filename && String(event.filename).indexOf('/assets/') !== -1) {
            showBootFailure(event.message || 'Script failed to load')
          }
        })

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason ? event.reason.message || String(event.reason) : 'Startup failed'
          showBootFailure(reason)
        })

        window.setTimeout(function () {
          showBootFailure('Startup timed out after 12 seconds.')
        }, 12000)
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
